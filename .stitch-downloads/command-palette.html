<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Command Palette - Focus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@600;700&amp;family=Spline+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#001f26",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "secondary": "#00687a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#40000d",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#5516be",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container": "#e5eeff",
                        "background": "#f8f9ff",
                        "on-primary-container": "#fffbff",
                        "primary-fixed-dim": "#d0bcff",
                        "on-tertiary-fixed-variant": "#92002a",
                        "on-primary-fixed": "#23005c",
                        "on-error": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "tertiary-container": "#dc2c4f",
                        "outline-variant": "#cbc3d7",
                        "primary-fixed": "#e9ddff",
                        "on-background": "#0b1c30",
                        "tertiary-fixed": "#ffdadb",
                        "primary": "#6b38d4",
                        "on-secondary-container": "#006172",
                        "secondary-fixed": "#acedff",
                        "inverse-surface": "#213145",
                        "surface-tint": "#6d3bd7",
                        "secondary-container": "#57dffe",
                        "on-surface": "#0b1c30",
                        "on-error-container": "#93000a",
                        "outline": "#7b7486",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "on-secondary-fixed-variant": "#004e5c",
                        "inverse-primary": "#d0bcff",
                        "surface-bright": "#f8f9ff",
                        "surface-container-highest": "#d3e4fe",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#4cd7f6",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-container-high": "#dce9ff",
                        "surface": "#f8f9ff",
                        "primary-container": "#8455ef",
                        "on-tertiary-container": "#fffbff",
                        "on-surface-variant": "#494454",
                        "tertiary": "#b90538"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "unit": "4px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "xs": "4px",
                        "margin": "32px",
                        "lg": "24px",
                        "xl": "48px"
                    },
                    "fontFamily": {
                        "label-caps": ["Space Grotesk"],
                        "headline-lg": ["Spline Sans"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Spline Sans"],
                        "body-sm": ["Inter"],
                        "button": ["Space Grotesk"],
                        "headline-sm": ["Spline Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "button": ["14px", { "lineHeight": "1", "fontWeight": "600" }],
                        "headline-sm": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #f8f9ff;
        }
        /* Custom scrollbar for the command palette */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbc3d7;
            border-radius: 9999px;
        }
        /* Subtly blurred background for the dashboard mock */
        .dashboard-bg {
            background-image: linear-gradient(135deg, #e5eeff 0%, #f8f9ff 100%);
            filter: blur(4px);
        }
    </style>
</head>
<body class="font-body-md text-on-background h-screen w-full overflow-hidden relative">
<!-- Mock Dashboard Background -->
<div class="absolute inset-0 dashboard-bg opacity-50 z-0"></div>
<!-- Overlay Backdrop -->
<div class="absolute inset-0 bg-inverse-surface/20 backdrop-blur-sm z-10 flex items-start justify-center pt-[102px] px-4">
<!-- Command Palette Container (Layer 2) -->
<div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(0,0,0,0.08)] overflow-hidden flex flex-col max-h-[819px] border border-outline-variant/30 transform transition-all translate-y-0">
<!-- Search Header -->
<div class="flex items-center px-lg py-md border-b border-surface-variant/50 relative">
<span class="material-symbols-outlined text-outline text-[24px] mr-sm">search</span>
<input autofocus="" class="w-full bg-transparent border-none outline-none font-body-lg text-on-surface placeholder:text-outline focus:ring-0 p-0 h-10" placeholder="Type a command or search..." type="text"/>
<div class="flex items-center gap-xs ml-sm">
<kbd class="font-label-caps text-label-caps text-on-surface-variant bg-surface-container-low px-2 py-1 rounded border border-outline-variant/50">esc</kbd>
</div>
</div>
<!-- Results Area -->
<div class="overflow-y-auto custom-scrollbar p-sm flex-1">
<!-- Section: Quick Actions -->
<div class="mb-md">
<div class="px-sm py-xs mb-xs">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Quick Actions</span>
</div>
<!-- Action Item (Active State) -->
<button class="w-full flex items-center justify-between p-sm rounded-lg bg-primary/10 text-primary group transition-colors">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]">add_task</span>
</div>
<span class="font-body-md text-body-md font-medium">New Task</span>
</div>
<div class="flex gap-1 opacity-100 transition-opacity">
<kbd class="font-label-caps text-label-caps text-primary bg-primary/20 px-2 py-1 rounded">↵</kbd>
</div>
</button>
<!-- Action Item -->
<button class="w-full flex items-center justify-between p-sm rounded-lg hover:bg-surface-container-low text-on-surface group transition-colors mt-unit">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-surface-container text-on-surface flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">timer</span>
</div>
<span class="font-body-md text-body-md">Start Timer</span>
</div>
<div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-label-caps text-label-caps text-outline bg-surface-variant px-2 py-1 rounded">⌘</span>
<span class="font-label-caps text-label-caps text-outline bg-surface-variant px-2 py-1 rounded">T</span>
</div>
</button>
<!-- Action Item -->
<button class="w-full flex items-center justify-between p-sm rounded-lg hover:bg-surface-container-low text-on-surface group transition-colors mt-unit">
<div class="flex items-center gap-md">
<div class="w-8 h-8 rounded-md bg-surface-container text-on-surface flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">folder_open</span>
</div>
<span class="font-body-md text-body-md">Go to Projects</span>
</div>
<div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="font-label-caps text-label-caps text-outline bg-surface-variant px-2 py-1 rounded">G</span>
<span class="font-label-caps text-label-caps text-outline bg-surface-variant px-2 py-1 rounded">P</span>
</div>
</button>
</div>
<!-- Section: Recent Documents -->
<div class="mb-md">
<div class="px-sm py-xs mb-xs flex items-center justify-between">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Recent Documents</span>
</div>
<button class="w-full flex items-center justify-between p-sm rounded-lg hover:bg-surface-container-low text-on-surface group transition-colors mt-unit">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-outline text-[20px] group-hover:text-primary transition-colors">description</span>
<div class="flex flex-col items-start">
<span class="font-body-md text-body-md leading-tight">Q3 Marketing Strategy</span>
<span class="font-body-sm text-body-sm text-on-surface-variant text-[12px]">Updated 2 hours ago in Marketing</span>
</div>
</div>
</button>
<button class="w-full flex items-center justify-between p-sm rounded-lg hover:bg-surface-container-low text-on-surface group transition-colors mt-unit">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-outline text-[20px] group-hover:text-primary transition-colors">description</span>
<div class="flex flex-col items-start">
<span class="font-body-md text-body-md leading-tight">Product Launch V2</span>
<span class="font-body-sm text-body-sm text-on-surface-variant text-[12px]">Updated yesterday in Design</span>
</div>
</div>
</button>
</div>
</div>
<!-- Footer -->
<div class="px-lg py-sm bg-surface-container-lowest border-t border-surface-variant/50 flex items-center justify-between mt-auto">
<div class="flex items-center gap-md text-on-surface-variant">
<div class="flex items-center gap-xs">
<kbd class="font-label-caps text-label-caps bg-surface-container px-1.5 py-0.5 rounded text-[10px]">↑</kbd>
<kbd class="font-label-caps text-label-caps bg-surface-container px-1.5 py-0.5 rounded text-[10px]">↓</kbd>
<span class="font-body-sm text-[11px]">Navigate</span>
</div>
<div class="flex items-center gap-xs">
<kbd class="font-label-caps text-label-caps bg-surface-container px-1.5 py-0.5 rounded text-[10px]">↵</kbd>
<span class="font-body-sm text-[11px]">Select</span>
</div>
</div>
<div class="font-headline-sm text-headline-sm text-primary opacity-50 text-[14px]">
                    Focus
                </div>
</div>
</div>
</div>
</body></html>
